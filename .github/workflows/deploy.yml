name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PROD_HOST: ${{ secrets.SSH_PROD_HOST }}
        run: |
          set -euo pipefail

          if [ -z "${SSH_PRIVATE_KEY}" ]; then
            echo "SSH_PRIVATE_KEY secret is empty"
            exit 1
          fi

          if [ -z "${SSH_PROD_HOST}" ]; then
            echo "SSH_PROD_HOST secret is empty"
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Remove possible CRLF from copied key and use explicit identity file.
          printf '%s\n' "${SSH_PRIVATE_KEY}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          SSH_TARGET="${SSH_PROD_HOST}"
          if [[ "${SSH_TARGET}" != *"@"* ]]; then
            SSH_TARGET="root@${SSH_TARGET}"
          fi

          PROD_HOST="${SSH_TARGET#*@}"
          ssh-keyscan -H "$PROD_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on server
        shell: bash
        env:
          SSH_PROD_HOST: ${{ secrets.SSH_PROD_HOST }}
          APP_DIR: ${{ vars.SSH_PROD_APP_DIR }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          SSH_TARGET="${SSH_PROD_HOST}"
          if [[ "${SSH_TARGET}" != *"@"* ]]; then
            SSH_TARGET="root@${SSH_TARGET}"
          fi

          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes "$SSH_TARGET" "APP_DIR='$APP_DIR' REPOSITORY='$REPOSITORY' bash -s" <<'EOF_REMOTE'
          set -euo pipefail

          APP_DIR="${APP_DIR:-/opt/trading_book}"
          REPOSITORY_URL="https://github.com/${REPOSITORY}.git"

          if ! command -v git >/dev/null 2>&1; then
            INSTALL_CMD=""
            if [ "$(id -u)" -eq 0 ]; then
              INSTALL_CMD=""
            elif command -v sudo >/dev/null 2>&1; then
              INSTALL_CMD="sudo"
            else
              echo "git is required, but installation needs root privileges or sudo."
              exit 1
            fi

            if command -v apt-get >/dev/null 2>&1; then
              # Some hosts have broken third-party apt repos; proceed with available indexes.
              if ! ${INSTALL_CMD} apt-get update; then
                echo "apt-get update had non-fatal errors; continuing with available package indexes."
              fi
              ${INSTALL_CMD} apt-get install -y git
            elif command -v dnf >/dev/null 2>&1; then
              ${INSTALL_CMD} dnf install -y git
            elif command -v yum >/dev/null 2>&1; then
              ${INSTALL_CMD} yum install -y git
            elif command -v apk >/dev/null 2>&1; then
              ${INSTALL_CMD} apk add --no-cache git
            else
              echo "git is required but no supported package manager was found."
              exit 1
            fi
          fi

          if [ ! -d "$APP_DIR/.git" ]; then
            git clone "$REPOSITORY_URL" "$APP_DIR"
          fi

          cd "$APP_DIR"
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

          docker compose up -d --build --remove-orphans
          docker image prune -f
          EOF_REMOTE
