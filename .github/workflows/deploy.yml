name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PROD_HOST: ${{ secrets.SSH_PROD_HOST }}
        run: |
          set -euo pipefail

          if [ -z "${SSH_PRIVATE_KEY}" ]; then
            echo "SSH_PRIVATE_KEY secret is empty"
            exit 1
          fi

          if [ -z "${SSH_PROD_HOST}" ]; then
            echo "SSH_PROD_HOST secret is empty"
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Remove possible CRLF from copied key and use explicit identity file.
          printf '%s\n' "${SSH_PRIVATE_KEY}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          SSH_TARGET="${SSH_PROD_HOST}"
          if [[ "${SSH_TARGET}" != *"@"* ]]; then
            SSH_TARGET="root@${SSH_TARGET}"
          fi

          PROD_HOST="${SSH_TARGET#*@}"
          ssh-keyscan -H "$PROD_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on server
        shell: bash
        env:
          SSH_PROD_HOST: ${{ secrets.SSH_PROD_HOST }}
          APP_DIR: ${{ vars.SSH_PROD_APP_DIR }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          SSH_TARGET="${SSH_PROD_HOST}"
          if [[ "${SSH_TARGET}" != *"@"* ]]; then
            SSH_TARGET="root@${SSH_TARGET}"
          fi

          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes "$SSH_TARGET" "APP_DIR='$APP_DIR' REPOSITORY='$REPOSITORY' bash -s" <<'EOF_REMOTE'
          set -euo pipefail

          APP_DIR="${APP_DIR:-/opt/trading_book}"
          REPOSITORY_URL="https://github.com/${REPOSITORY}.git"

          if [ ! -d "$APP_DIR/.git" ]; then
            git clone "$REPOSITORY_URL" "$APP_DIR"
          fi

          cd "$APP_DIR"
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

          cp .env.prod .env

          docker compose up -d --build --remove-orphans
          docker image prune -f
          EOF_REMOTE
